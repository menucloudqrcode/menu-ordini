<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Ordini — Pizzeria Bella Napoli</title>
  <style>
    body { font-family:'Jost',Arial,sans-serif; background:#f7f3ec; margin:0; padding:20px; }
    h1 { text-align:center; font-family:'Cormorant Garamond',serif; color:#b8963e; }
    .order-card {
      background:white; border-radius:8px; padding:16px; margin:12px 0;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    .order-header { display:flex; justify-content:space-between; font-weight:600; }
    .status { font-size:14px; padding:4px 8px; border-radius:12px; color:white; }
    .status.new { background:#e67e22; }
    .status.preparing { background:#f1c40f; color:#333; }
    .status.done { background:#2ecc71; }
    .order-items { margin:8px 0; }
    .actions { display:flex; gap:8px; margin-top:8px; }
    button { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:500; }
    .btn-prepare { background:#f39c12; color:white; }
    .btn-done { background:#27ae60; color:white; }
    .btn-delete { background:#e74c3c; color:white; }
    .timestamp { font-size:12px; color:#888; }
  </style>
</head>
<body>
  <h1>📋 Ordini in arrivo</h1>
  <div id="orders-container">Nessun ordine ancora...</div>

  <audio id="notification-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    // ⚠️ SOSTITUISCI con il tuo firebaseConfig (lo stesso di menu.html)
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCLHayVPxrzcnUvhCZlOLcGf9RVeApfjl0",
  authDomain: "qrcode-7d987.firebaseapp.com",
  databaseURL: "https://qrcode-7d987-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "qrcode-7d987",
  storageBucket: "qrcode-7d987.firebasestorage.app",
  messagingSenderId: "873757256026",
  appId: "1:873757256026:web:31d2006910731b59b5eb63",
  measurementId: "G-2JMFS40K0H"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ordersRef = db.ref('orders');
    const container = document.getElementById('orders-container');
    const audio = document.getElementById('notification-sound');

    ordersRef.on('child_added', snapshot => {
      const order = snapshot.val();
      order.id = snapshot.key;
      displayOrder(order);
      audio.play().catch(() => {});
    });

    ordersRef.on('child_changed', snapshot => {
      const order = snapshot.val();
      order.id = snapshot.key;
      updateOrder(order);
    });

    ordersRef.on('child_removed', snapshot => {
      document.getElementById(`order-${snapshot.key}`)?.remove();
    });

    function displayOrder(order) {
      if (document.getElementById(`order-${order.id}`)) return;
      const card = document.createElement('div');
      card.className = 'order-card';
      card.id = `order-${order.id}`;
      card.innerHTML = buildOrderHTML(order);
      container.prepend(card);
      if (container.textContent === 'Nessun ordine ancora...') container.innerHTML = '';
    }

    function updateOrder(order) {
      const card = document.getElementById(`order-${order.id}`);
      if (card) card.innerHTML = buildOrderHTML(order);
    }

    function buildOrderHTML(order) {
      const time = new Date(order.timestamp).toLocaleTimeString('it-IT');
      return `
        <div class="order-header">
          <span>🛎️ Tavolo ${order.table}</span>
          <span class="status ${order.status || 'new'}">${(order.status || 'new').toUpperCase()}</span>
        </div>
        <div class="order-items">
          ${order.items.map(i => `<div>${i.name} – €${i.price.toFixed(2)}</div>`).join('')}
        </div>
        <div><strong>Totale: €${order.total.toFixed(2)}</strong></div>
        <div class="timestamp">${time}</div>
        <div class="actions">
          ${order.status === 'new' ? `<button class="btn-prepare" onclick="setStatus('${order.id}', 'preparing')">In preparazione</button>` : ''}
          ${order.status === 'preparing' ? `<button class="btn-done" onclick="setStatus('${order.id}', 'done')">Completato</button>` : ''}
          <button class="btn-delete" onclick="deleteOrder('${order.id}')">🗑️ Rimuovi</button>
        </div>
      `;
    }

    function setStatus(orderId, status) {
      ordersRef.child(orderId).update({ status });
    }

    function deleteOrder(orderId) {
      if (confirm('Rimuovere questo ordine?')) ordersRef.child(orderId).remove();
    }
  </script>
</body>
</html>
